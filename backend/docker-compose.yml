version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: clauseiq-postgres
    environment:
      POSTGRES_USER: clauseiq
      POSTGRES_PASSWORD: clauseiq
      POSTGRES_DB: clauseiq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clauseiq"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: clauseiq-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://clauseiq:clauseiq@postgres:5432/clauseiq
      USE_SQLITE: "False"
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      DEBUG: ${DEBUG:-False}
    volumes:
      - ./uploads:/app/uploads
      - ./chroma_db:/app/chroma_db
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Waiting for PostgreSQL...' &&
        sleep 5 &&
        python -m alembic upgrade head &&
        python seed_data/seed_db.py &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

volumes:
  postgres_data:
